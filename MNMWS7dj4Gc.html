function ab(b64){var s=atob(b64),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function unlock(pw){
  var raw=ab(B64),salt=raw.slice(0,16),nonce=raw.slice(16,28),ct=raw.slice(28);
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:310000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},key,ct);
  return new TextDecoder().decode(pt);}
async function go(){
  var pw=document.getElementById("pw").value;
  if(!pw)return;
  document.getElementById("msg").textContent="復号中...";
  try{var html=await unlock(pw);
    sessionStorage.setItem("pgpw",pw);
    document.open();document.write(html);document.close();
  }catch(e){document.getElementById("msg").textContent="パスワードが違います";}}
document.getElementById("go").addEventListener("click",go);
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")go();});
(function(){var s=sessionStorage.getItem("pgpw");
  if(s){unlock(s).then(function(html){document.open();document.write(html);document.close();}).catch(function(){sessionStorage.removeItem("pgpw");});}})();
